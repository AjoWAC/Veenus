<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Portfolio — Veenus PVC interior solutions." />
  <title>Portfolio — Veenus</title>
  <link href="src/css/header.css" rel="stylesheet" />
  <link rel="stylesheet" href="src/css/about-banner.css" />
  <link rel="stylesheet" href="src/css/main.css" />
</head>
<body class="bg-white text-neutral-900 antialiased page-solid-header">

  <div data-include="Header.html"></div>

  <main>
   <section class="about-banner" aria-label="About Veenus hero">
  <picture class="about-banner__bg">
    <!-- Desktop: protfolio-banner-desk.jpg | 1920×600px | full-bleed hero, CSS-fixed height via .about-banner -->
    <source media="(min-width: 1024px)" srcset="src/images/protfolio-banner-desk.jpg" width="1920" height="600">
    <!-- Mobile:  390×640px | full-bleed hero, CSS-fixed height via .about-banner -->
    <img src="src/images/product-banner-mob.jpg" alt="" width="390" height="640" loading="eager" fetchpriority="high">
  </picture>

  <div class="about-banner__overlay" aria-hidden="true"></div>

  <div class="about-banner__inner">
    <h1 class="about-banner__title">
     Projects that   <em>Define Quality</em>
    </h1>
    <p class="about-banner__text">
     Transforming interiors with high-performance PVC wall panels, ceilings, and finishes that blend aesthetics and durability. </p>
    <!-- <a href="#" class="btn btn--border-square btn--border-square--ghost about-banner__cta">
      Explore Products
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </a> -->
  </div>
</section>

  <div data-include="portfolio/Intro.html"></div>
  <div data-include="portfolio/Projects.html"></div>
  <div data-include="portfolio/ProductsRange.html"></div>
  </main>

  <!-- Projects Lightbox -->
  <div id="projects-lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Project image viewer" aria-hidden="true">
    <div class="lightbox__backdrop" id="lightbox-backdrop"></div>
    <div class="lightbox__card">
      <div class="lightbox__image-wrap">
        <button class="lightbox__arrow lightbox__arrow--prev" id="lightbox-prev" aria-label="Previous project">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M11.25 13.5L6.75 9l4.5-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="lightbox-embla" id="lightbox-embla">
          <div class="lightbox-embla__container" id="lightbox-embla-container"></div>
        </div>
        <button class="lightbox__arrow lightbox__arrow--next" id="lightbox-next" aria-label="Next project">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
            <path d="M6.75 4.5L11.25 9l-4.5 4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="lightbox__dots" id="lightbox-dots"></div>
      </div>
      <div class="lightbox__footer">
        <div>
          <p class="lightbox__category" id="lightbox-category"></p>
          <p class="lightbox__title" id="lightbox-title"></p>
        </div>
      </div>
    </div>
  </div>

  <div data-include="Footer.html"></div>

  <script src="https://unpkg.com/embla-carousel@8.3.0/embla-carousel.umd.js"></script>
  <script src="src/js/main.js" defer></script>
</body>
</html>
