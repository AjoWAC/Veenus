<section class="gr-hero">
  <div class="gr-hero__bg">
    <!-- Image
         Source : 2880×1463px (landscape)
         Ratio  : 2880:1463 (≈ 1.97:1)
         Mobile : full-bleed hero bg — CSS-fixed height via .gr-hero, object-cover crops
         Desktop: full-bleed hero bg — CSS-fixed height via .gr-hero, object-cover crops
    -->
    <img
      src="src/images/greenrich-hero-bg.jpg"
      width="2880"
      height="1463"
      class="gr-hero__bg-img"
      loading="eager"
      alt="Modern dining interior with PVC wall panels"
    />
    <div class="gr-hero__overlay" aria-hidden="true"></div>
  </div>

  <div class="gr-hero__content">
    <div class="gr-hero__upper">
      <a href="/" class="gr-hero__logo" aria-label="Greenrich Laminates home">
        <!-- Image
             Source : 270×147px (logo, PNG with transparency)
             Ratio  : 270:147 (≈ 1.84:1)
             Mobile : fixed 180×97px display (CSS-controlled via .gr-hero__logo)
             Desktop: fixed 180×97px display (CSS-controlled via .gr-hero__logo)
        -->
        <img
          src="src/images/greenrich-logo.png"
          width="270"
          height="147"
          alt="Greenrich Laminates"
        />
      </a>

      <h1 class="gr-hero__heading title">
        India's First Double-Side <em>PVC HPL Sheet</em>
      </h1>

      <div class="gr-hero__lower">
        <p class="gr-hero__desc">
          Greenrich delivers high-performance decorative laminate surfaces designed for modern
          interiors, engineered for those who demand excellence in every detail.
        </p>

        <a href="#products" class="btn btn--border-square btn--border-square--ghost gr-hero__cta-btn">
          Explore Products
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>

  </div>
</section>
