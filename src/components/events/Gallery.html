<section class="events-gallery-section bg-white py-15 lg:py-32.5">
  <div class="container">
    <div class="flex flex-col gap-10 lg:gap-18">

      <!-- Heading -->
      <div class="flex flex-col gap-4 items-center text-center">
        <h2 class="title font-normal text-[clamp(2.1875rem,3.6vw,2.875rem)] leading-[1.3] tracking-[-0.02em] text-black">
          A Visual Journey <em>Through Our Events</em>
        </h2>
        <p class="text-base lg:text-[1.125rem] text-[#6e6e6e] leading-[1.4] lg:max-w-213">
          A visual journey through our most memorable moments, from bustling exhibition floors to intimate designer meetups.
        </p>
      </div>

      <!-- Masonry gallery
           Images display at natural proportions — Masonry.js + imagesLoaded handle layout.
           Mobile : 2 columns, 12px gutter
           Desktop: 4 columns, 20px gutter
      -->
      <div class="gallery-masonry" id="gallery-masonry">
        <!-- Sizer + gutter elements for responsive Masonry column/gap calculation -->
        <div class="gallery-masonry__sizer"></div>
        <div class="gallery-masonry__gutter"></div>

        <!-- Image
             Source : 1200×900px (PNG) | 4:3
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-01.png" width="1200" height="900" class="w-full h-auto block" loading="lazy" alt="Event gallery image 1" />
        </div>

        <!-- Image
             Source : 1000×1474px (PNG) | portrait 2:3
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-02.png" width="1000" height="1474" class="w-full h-auto block" loading="lazy" alt="Event gallery image 2" />
        </div>

        <!-- Image
             Source : 960×639px (PNG) | 3:2
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-03.png" width="960" height="639" class="w-full h-auto block" loading="lazy" alt="Event gallery image 3" />
        </div>

        <!-- Image
             Source : 1200×800px (PNG) | 3:2
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-04.png" width="1200" height="800" class="w-full h-auto block" loading="lazy" alt="Event gallery image 4" />
        </div>

        <!-- Image
             Source : 1200×1800px (PNG) | portrait 2:3
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-05.png" width="1200" height="1800" class="w-full h-auto block" loading="lazy" alt="Event gallery image 5" />
        </div>

        <!-- Image
             Source : 1000×707px (PNG) | 3:2
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-06.png" width="1000" height="707" class="w-full h-auto block" loading="lazy" alt="Event gallery image 6" />
        </div>

        <!-- Image
             Source : 1200×800px (PNG) | 3:2
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-07.png" width="1200" height="800" class="w-full h-auto block" loading="lazy" alt="Event gallery image 7" />
        </div>

        <!-- Image
             Source : 1200×800px (PNG) | 3:2
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-08.png" width="1200" height="800" class="w-full h-auto block" loading="lazy" alt="Event gallery image 8" />
        </div>

        <!-- Image
             Source : 1200×900px (PNG) | 4:3
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-09.png" width="1200" height="900" class="w-full h-auto block" loading="lazy" alt="Event gallery image 9" />
        </div>

        <!-- Image
             Source : 900×637px (PNG) | 3:2
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-10.png" width="900" height="637" class="w-full h-auto block" loading="lazy" alt="Event gallery image 10" />
        </div>

        <!-- Image
             Source : 1024×756px (PNG) | 4:3
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-11.png" width="1024" height="756" class="w-full h-auto block" loading="lazy" alt="Event gallery image 11" />
        </div>

        <!-- Image
             Source : 870×580px (PNG) | 3:2
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-gallery-12.png" width="870" height="580" class="w-full h-auto block" loading="lazy" alt="Event gallery image 12" />
        </div>

        <!-- Image
             Source : 1200×649px (PNG) | ≈ 1.85:1
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-milan-design-week.png" width="1200" height="649" class="w-full h-auto block" loading="lazy" alt="Milan Design Week 2025" />
        </div>

        <!-- Image
             Source : 1200×675px (PNG) | 16:9
        -->
        <div class="gallery-masonry__item gallery-item">
          <img src="src/images/event-trade-show-global.png" width="1200" height="675" class="w-full h-auto block" loading="lazy" alt="Global Building Materials Trade Show" />
        </div>

        <!-- Image
             Source : 1200×780px (PNG) | 20:13
        -->

          <img src="src/images/event-trade-show-dubai.png" width="1200" height="780" class="w-full h-auto block" loading="lazy" alt="Global Building Materials Trade Show — Dubai" />
        </div>

      </div>

      <!-- Load More -->
      <div class="flex justify-center">
        <a href="#" class="btn btn--border-square">
          Load More
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M3 8h10M9 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>

    </div>
  </div>

  <!-- Gallery Lightbox -->
  <div id="gallery-lightbox" class="gallery-lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" aria-hidden="true" tabindex="-1">
    <div class="gallery-lightbox__backdrop" id="gallery-lightbox-backdrop"></div>
    <div class="gallery-lightbox__inner">

      <button class="gallery-lightbox__close" id="gallery-lightbox-close" aria-label="Close">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
          <path d="M13.5 4.5L4.5 13.5M4.5 4.5l9 9" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </button>

      <button class="gallery-lightbox__arrow gallery-lightbox__arrow--prev" id="gallery-lightbox-prev" aria-label="Previous image">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M12.5 15L7.5 10l5-5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <img id="gallery-lightbox-img" src="" alt="" class="gallery-lightbox__img" />

      <button class="gallery-lightbox__arrow gallery-lightbox__arrow--next" id="gallery-lightbox-next" aria-label="Next image">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" aria-hidden="true">
          <path d="M7.5 5l5 5-5 5" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>

      <div class="gallery-lightbox__counter" id="gallery-lightbox-counter" aria-live="polite">1 / 15</div>

    </div>
  </div>

</section>
